<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Icon Match</title>
    <!-- Loading Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Configure Tailwind to support class-based dark mode
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    
    <style>
        /* Aptos/Modern Sans-Serif Stack with premium UI optimizations */
        body {
            font-family: 'Aptos', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            transition: background-color 0.4s ease, color 0.4s ease;
        }

        /* 3D Card Flip Mechanics */
        .card {
            perspective: 1000px;
            aspect-ratio: 1 / 1;
            width: 100%;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
            transform-style: preserve-3d;
            cursor: pointer;
        }

        .card.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.08);
            user-select: none;
            transition: border-color 0.2s, box-shadow 0.2s, background-color 0.3s;
        }

        /* Front face of card (Hidden State) */
        .card-front {
            background: linear-gradient(135deg, #ffffff 0%, #f8fafc 100%);
            border: 2px solid #cbd5e1;
            color: #64748b;
            font-size: var(--mystery-size, 1.5rem);
            font-weight: 800;
        }

        .dark .card-front {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border-color: #475569;
            color: #94a3b8;
        }

        .card:hover .card-front {
            border-color: #3b82f6;
            box-shadow: 0 8px 12px -3px rgba(59, 130, 246, 0.15);
        }

        /* Revealed back face of card */
        .card-back {
            background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
            transform: rotateY(180deg);
            /* Maximum visual scale for icons while maintaining internal padding */
            font-size: var(--icon-size, 2.5rem);
            line-height: 1;
            padding: 4px;
        }

        /* Matched State styling with pulse animation */
        .card.matched .card-back {
            background: linear-gradient(135deg, #10b981 0%, #047857 100%);
            box-shadow: 0 0 12px rgba(16, 185, 129, 0.4);
            animation: match-pulse 0.4s ease-out;
        }

        @keyframes match-pulse {
            0% { transform: rotateY(180deg) scale(1); }
            50% { transform: rotateY(180deg) scale(1.1); }
            100% { transform: rotateY(180deg) scale(1); }
        }

        #game-grid {
            display: grid;
            gap: 6px;
            width: 100%;
            max-width: 380px;
            margin: 0 auto;
        }

        /* Tactile Active States and Controls */
        .btn-toggle {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .btn-toggle:active {
            transform: scale(0.95);
        }

        .difficulty-active, .timer-active {
            background-color: #2563eb !important;
            color: #ffffff !important;
            border-color: #2563eb !important;
            box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.3);
        }

        #preview-bar {
            height: 4px;
            background: linear-gradient(90deg, #3b82f6, #60a5fa);
            width: 0%;
            transition: width linear;
        }
    </style>
</head>
<body class="bg-slate-100 text-slate-800 dark:bg-slate-900 dark:text-slate-100 p-3 flex flex-col items-center justify-start select-none min-h-screen">

    <div class="w-full max-w-sm text-center mb-2">
        <div class="flex items-center justify-between mb-2">
            <div class="flex items-center gap-2">
                <span class="text-2xl">🧠</span>
                <h1 class="text-2xl font-black tracking-tight text-slate-800 dark:text-slate-50">Icon Match</h1>
            </div>
            
            <!-- Dark Mode Toggle Button -->
            <button onclick="toggleDarkMode()" id="theme-toggle" class="btn-toggle p-2 rounded-lg bg-white/80 dark:bg-slate-800/80 border border-slate-200 dark:border-slate-700 shadow-sm text-lg">
                🌙
            </button>
        </div>
        
        <!-- Difficulty selection -->
        <div class="flex justify-center gap-1.5 mb-2.5">
            <button onclick="setDifficulty('easy')" id="btn-easy" class="btn-toggle px-3.5 py-1 text-xs rounded-full border border-slate-300 dark:border-slate-700 text-slate-600 dark:text-slate-300 font-bold bg-white/50 dark:bg-slate-800/50 backdrop-blur-sm">Easy</button>
            <button onclick="setDifficulty('medium')" id="btn-medium" class="btn-toggle px-3.5 py-1 text-xs rounded-full border border-slate-300 dark:border-slate-700 text-slate-600 dark:text-slate-300 font-bold bg-white/50 dark:bg-slate-800/50 backdrop-blur-sm">Medium</button>
            <button onclick="setDifficulty('hard')" id="btn-hard" class="btn-toggle px-3.5 py-1 text-xs rounded-full border border-slate-300 dark:border-slate-700 text-slate-600 dark:text-slate-300 font-bold bg-white/50 dark:bg-slate-800/50 backdrop-blur-sm">Hard</button>
        </div>

        <!-- Starting View Timer -->
        <div class="mb-3 bg-white/60 dark:bg-slate-800/60 p-2 rounded-xl border border-slate-200/50 dark:border-slate-700/50 shadow-sm">
            <p class="text-[9px] uppercase tracking-wider text-slate-500 dark:text-slate-400 font-black mb-1.5">Starting View Time</p>
            <div class="flex justify-center gap-1.5">
                <button onclick="setPreviewTime(2)" id="time-2" class="btn-toggle px-4 py-1 text-xs font-bold rounded-lg border border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-300 bg-white dark:bg-slate-800 shadow-sm">2s</button>
                <button onclick="setPreviewTime(5)" id="time-5" class="btn-toggle px-4 py-1 text-xs font-bold rounded-lg border border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-300 bg-white dark:bg-slate-800 shadow-sm">5s</button>
                <button onclick="setPreviewTime(10)" id="time-10" class="btn-toggle px-4 py-1 text-xs font-bold rounded-lg border border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-300 bg-white dark:bg-slate-800 shadow-sm">10s</button>
            </div>
        </div>

        <!-- Dynamic stats counters -->
        <div class="flex justify-between items-center text-slate-700 dark:text-slate-300 text-xs px-2 mb-1.5 font-semibold">
            <div class="bg-white/80 dark:bg-slate-800/80 px-3 py-1 rounded-lg border border-slate-200 dark:border-slate-700 shadow-sm">
                Moves: <span id="move-count" class="font-bold text-blue-600 dark:text-blue-400">0</span>
            </div>
            <div class="bg-white/80 dark:bg-slate-800/80 px-3 py-1 rounded-lg border border-slate-200 dark:border-slate-700 shadow-sm">
                Matched: <span id="match-count" class="font-bold text-emerald-600 dark:text-emerald-400">0</span> / <span id="total-pairs" class="text-slate-500">0</span>
            </div>
        </div>

        <!-- Countdown bar container -->
        <div class="w-full bg-slate-200 dark:bg-slate-700 rounded-full h-1 mb-1 overflow-hidden shadow-inner">
            <div id="preview-bar"></div>
        </div>
    </div>

    <!-- The Game Matrix -->
    <div id="game-grid"></div>

    <!-- Main action panels -->
    <div class="w-full max-w-[380px] flex gap-3 mt-4">
        <button onclick="showHint()" id="hint-btn" class="flex-1 py-3 bg-amber-500 text-white font-extrabold text-sm rounded-xl hover:bg-amber-600 active:scale-95 transition-all shadow-md shadow-amber-500/20 disabled:opacity-30 disabled:pointer-events-none">
            ⚡ Show Hint
        </button>
        <button onclick="triggerGiveUpConfirm()" id="giveup-btn" class="flex-1 py-3 bg-slate-700 text-slate-100 font-extrabold text-sm rounded-xl hover:bg-slate-800 active:scale-95 transition-all shadow-md shadow-slate-700/20 dark:bg-slate-800 dark:hover:bg-slate-700">
            🏳️ Give Up
        </button>
    </div>

    <!-- Custom Confirm Reset Dialog -->
    <div id="confirm-modal" class="fixed inset-0 bg-slate-900/60 hidden flex items-center justify-center p-6 z-50 backdrop-blur-sm">
        <div class="bg-white dark:bg-slate-800 rounded-2xl p-6 w-full max-w-xs text-center shadow-2xl border border-slate-100 dark:border-slate-700">
            <div class="text-3xl mb-2">🤔</div>
            <h2 class="text-lg font-bold text-slate-800 dark:text-slate-100 mb-1">Give Up Already?</h2>
            <p class="text-xs text-slate-500 dark:text-slate-400 mb-4">Are you sure you want to reveal all icons and start over?</p>
            <div class="flex gap-2">
                <button onclick="confirmGiveUp()" class="flex-1 py-2 bg-red-500 text-white font-bold text-xs rounded-lg hover:bg-red-600 transition-colors">Yes, Reset</button>
                <button onclick="closeConfirm()" class="flex-1 py-2 bg-slate-200 dark:bg-slate-700 text-slate-800 dark:text-slate-200 font-bold text-xs rounded-lg hover:bg-slate-300 dark:hover:bg-slate-600 transition-colors">No, Keep Playing</button>
            </div>
        </div>
    </div>

    <!-- Success Victory Modal -->
    <div id="modal" class="fixed inset-0 bg-slate-900/60 hidden flex items-center justify-center p-6 z-50 backdrop-blur-sm">
        <div class="bg-white dark:bg-slate-800 rounded-2xl p-6 w-full max-w-xs text-center shadow-2xl border border-slate-100 dark:border-slate-700">
            <div class="text-4xl mb-3">🏆</div>
            <!-- Dynamic Encouragement Header -->
            <h2 id="encouragement-title" class="text-xl font-black text-blue-600 dark:text-blue-400 leading-tight mb-2">Awesome Work!</h2>
            <p id="result-text" class="text-xs text-slate-500 dark:text-slate-400 mb-5 leading-relaxed"></p>
            <button onclick="shareResults()" class="w-full py-3 bg-green-500 text-white font-extrabold text-xs rounded-xl mb-2.5 flex items-center justify-center gap-2 shadow-lg shadow-green-500/20 active:scale-95 transition-transform">
                💬 Share to WhatsApp
            </button>
            <button onclick="resetGame()" class="w-full py-3 bg-slate-100 dark:bg-slate-700 text-slate-700 dark:text-slate-200 font-bold text-xs rounded-xl hover:bg-slate-200 dark:hover:bg-slate-600 transition-all">
                Play Again
            </button>
        </div>
    </div>

    <script>
        // High density visual symbol stack (emoji deck)
        const icons = ['🍎', '🍌', '🍇', '🍓', '🍒', '🍍', '🥝', '🍉', '🥑', '🥦', '🥕', '🌽', '🥨', '🍕', '🍔', '🍦', '🍩', '🌮', '🍣', '🥞', '🍱', '🍘', '🍙', '🍛', '🍜', '🍝', '🍞', '🧀', '🥚', '🥩'];
        let difficulty = 'easy';
        let previewSeconds = 5;
        let flippedCards = [];
        let moves = 0;
        let matches = 0;
        let isLocked = true;
        let hintUsed = false;

        // Dynamic visual praise metrics matched to memory score and speed
        const encouragementNotes = [
            "Your visual memory is absolutely legendary! 🌟",
            "An outstanding display of razor-sharp mental focus! ⚡",
            "Incredible! Your brain's cognitive gears are running in high gear. 🧠🔥",
            "A masterclass in concentration and quick reflexes! 🛸",
            "Outstanding! Your neural mapping is absolutely flawless! 🧬",
            "Superb! You tracked down every single pairing with total precision! 🎯"
        ];

        // Perfect, responsive grid proportions with optimal cell emoji scaling sizes
        const config = {
            easy: { rows: 4, cols: 3, pairs: 6, iconSize: '3rem', mysterySize: '1.8rem' },
            medium: { rows: 4, cols: 4, pairs: 8, iconSize: '2.5rem', mysterySize: '1.6rem' },
            hard: { rows: 6, cols: 5, pairs: 15, iconSize: '1.95rem', mysterySize: '1.25rem' }
        };

        // Theme switching handler
        function toggleDarkMode() {
            const html = document.documentElement;
            const toggleBtn = document.getElementById('theme-toggle');
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                toggleBtn.textContent = '🌙';
                localStorage.setItem('theme', 'light');
            } else {
                html.classList.add('dark');
                toggleBtn.textContent = '☀️';
                localStorage.setItem('theme', 'dark');
            }
        }

        // Apply saved theme preference on start
        function initTheme() {
            const savedTheme = localStorage.getItem('theme');
            const toggleBtn = document.getElementById('theme-toggle');
            if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
                toggleBtn.textContent = '☀️';
            } else {
                document.documentElement.classList.remove('dark');
                toggleBtn.textContent = '🌙';
            }
        }

        function setDifficulty(level) {
            difficulty = level;
            document.querySelectorAll('[id^="btn-"]').forEach(btn => btn.classList.remove('difficulty-active'));
            document.getElementById(`btn-${level}`).classList.add('difficulty-active');
            resetGame();
        }

        function setPreviewTime(sec) {
            previewSeconds = sec;
            document.querySelectorAll('[id^="time-"]').forEach(btn => btn.classList.remove('timer-active'));
            document.getElementById(`time-${sec}`).classList.add('timer-active');
            resetGame();
        }

        function resetGame() {
            const { pairs, cols, iconSize, mysterySize } = config[difficulty];
            const grid = document.getElementById('game-grid');
            grid.innerHTML = '';
            grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
            
            // Inject customized sizing metrics directly into variables
            grid.style.setProperty('--icon-size', iconSize);
            grid.style.setProperty('--mystery-size', mysterySize);
            
            moves = 0;
            matches = 0;
            flippedCards = [];
            isLocked = true;
            hintUsed = false;
            
            document.getElementById('move-count').textContent = moves;
            document.getElementById('match-count').textContent = matches;
            document.getElementById('total-pairs').textContent = pairs;
            document.getElementById('modal').classList.add('hidden');
            document.getElementById('confirm-modal').classList.add('hidden');
            document.getElementById('hint-btn').disabled = true;
            
            const bar = document.getElementById('preview-bar');
            bar.style.transition = 'none';
            bar.style.width = '100%';

            // Pick a randomized icon selection
            const gameIcons = [...icons].sort(() => Math.random() - 0.5).slice(0, pairs);
            const deck = [...gameIcons, ...gameIcons].sort(() => Math.random() - 0.5);

            deck.forEach((icon) => {
                const card = document.createElement('div');
                card.className = 'card flipped';
                card.dataset.icon = icon;
                card.innerHTML = `
                    <div class="card-inner">
                        <div class="card-front">?</div>
                        <div class="card-back">${icon}</div>
                    </div>
                `;
                card.onclick = () => flipCard(card);
                grid.appendChild(card);
            });

            // Trigger preview bar timer animation
            setTimeout(() => {
                bar.style.transition = `width ${previewSeconds}s linear`;
                bar.style.width = '0%';
                
                setTimeout(() => {
                    document.querySelectorAll('.card').forEach(c => c.classList.remove('flipped'));
                    isLocked = false;
                    document.getElementById('hint-btn').disabled = false;
                }, previewSeconds * 1000);
            }, 100);
        }

        function flipCard(card) {
            if (isLocked || card.classList.contains('flipped') || card.classList.contains('matched')) return;
            card.classList.add('flipped');
            flippedCards.push(card);
            if (flippedCards.length === 2) {
                moves++;
                document.getElementById('move-count').textContent = moves;
                checkMatch();
            }
        }

        function checkMatch() {
            isLocked = true;
            const [card1, card2] = flippedCards;
            const match = card1.dataset.icon === card2.dataset.icon;
            if (match) {
                card1.classList.add('matched');
                card2.classList.add('matched');
                matches++;
                document.getElementById('match-count').textContent = matches;
                flippedCards = [];
                isLocked = false;
                if (matches === config[difficulty].pairs) {
                    setTimeout(showWinScreen, 450);
                }
            } else {
                setTimeout(() => {
                    card1.classList.remove('flipped');
                    card2.classList.remove('flipped');
                    flippedCards = [];
                    isLocked = false;
                }, 750);
            }
        }

        function showHint() {
            if (isLocked || hintUsed) return;
            hintUsed = true;
            isLocked = true;
            const allCards = document.querySelectorAll('.card:not(.matched)');
            allCards.forEach(c => c.classList.add('flipped'));
            document.getElementById('hint-btn').disabled = true;
            setTimeout(() => {
                allCards.forEach(c => {
                    if (!flippedCards.includes(c)) c.classList.remove('flipped');
                });
                isLocked = false;
            }, 1000);
        }

        function triggerGiveUpConfirm() {
            document.getElementById('confirm-modal').classList.remove('hidden');
        }

        function closeConfirm() {
            document.getElementById('confirm-modal').classList.add('hidden');
        }

        function confirmGiveUp() {
            document.getElementById('confirm-modal').classList.add('hidden');
            document.querySelectorAll('.card').forEach(c => {
                c.classList.add('flipped');
                c.classList.add('matched');
            });
            isLocked = true;
        }

        function showWinScreen() {
            const date = new Date().toLocaleDateString();
            const randomNote = encouragementNotes[Math.floor(Math.random() * encouragementNotes.length)];
            
            document.getElementById('encouragement-title').innerText = randomNote;
            document.getElementById('result-text').innerText = `Difficulty: ${difficulty.toUpperCase()}\nMoves Taken: ${moves}\nPlayed: ${date}`;
            document.getElementById('modal').classList.remove('hidden');
        }

        function shareResults() {
            const date = new Date().toLocaleDateString();
            const text = `🧠 Brain Exercise Complete!\n\nDifficulty: ${difficulty.toUpperCase()}\nMoves: ${moves}\nDate: ${date}\n\nCan you beat my score? Play now!`;
            const url = `whatsapp://send?text=${encodeURIComponent(text)}`;
            window.location.href = url;
        }

        // Initialize board configuration on system window load
        window.onload = () => {
            initTheme();
            setPreviewTime(5);
            setDifficulty('easy');
        };
    </script>
</body>
</html>
